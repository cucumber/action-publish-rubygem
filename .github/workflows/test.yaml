name: Test

permissions: {}

on:
  # Do not trigger on every change. Don't spam Gems.
  workflow_call:

jobs:
  test-publish-gem:
    name: It publishes a RubyGem in a folder
    runs-on: ubuntu-latest
    environment: Publish to Rubygems
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: 4.0.6
          bundler-cache: true
      - name: Configure RubyGems Credentials
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0
      - name: Test the action
        uses: ./
        with:
          working-directory: "test"
      - name: Check latest published gem version is as expected
        run: |
          payload=$(curl https://rubygems.org//api/v1/versions/cucumber-test-release-automation/latest.json)
          actual_version=$(echo "$payload" | jq .version --raw-output)
          expected_version="0.0.${EXPECTED_PATCH_VERSION}"
          echo "actual_version: $actual_version"
          echo "expected_version: $expected_version"
          [ "${actual_version}" == "${expected_version}" ]
        env:
          EXPECTED_PATCH_VERSION: ${{ github.sha}}
