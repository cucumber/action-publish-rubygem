name: Test

permissions: {}

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - renovate/**

jobs:
  test-publish-gem:
    name: It publishes a RubyGem in a folder
    runs-on: ubuntu-latest
    environment: Publish to Rubygems
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: 4.0.5
          bundler-cache: true
      - name: Configure RubyGems Credentials
        uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0
      - name: Test the action
        uses: ./
        with:
          working-directory: "test"
      - name: Check latest published gem version is as expected
        run: |
          payload=$(curl https://rubygems.org//api/v1/versions/cucumber-test-release-automation/latest.json)
          actual_version=$(echo "$payload" | jq .version --raw-output)
          expected_version="0.0.${EXPECTED_PATCH_VERSION}"
          echo "actual_version: $actual_version"
          echo "expected_version: $expected_version"
          [ "${actual_version}" == "${expected_version}" ]
        env:
          EXPECTED_PATCH_VERSION: ${{ github.sha}}
